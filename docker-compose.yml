services:
  db:
    image: postgres:16
    container_name: cardinalcheckout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardinal
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: cardinalcheckout
    ports:
      - "5432:5432"
    volumes:
      - cardinal_pgdata:/var/lib/postgresql/data

volumes:
  cardinal_pgdata: